<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="format-detection" content="telephone=no, address=no, email=no">
<meta name="referrer" content="no-referrer">

<meta name="theme-color" media="(prefers-color-scheme: light)" content="#fcfcfd">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0d1117">

<style>
  :root {
    color-scheme: light dark;
  }

  html {
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    scroll-behavior: smooth;
  }

  body {
    margin: 0;
    padding: 0;
    background: transparent;
  }

  /* =========================================================
     Code Block Wrapper + Copy Button
     - style.less のモダン配色と整合
     - フォント設定は style.less 側を利用
     ========================================================= */

  .code-block-wrapper {
    position: relative;
    margin: 2em 0;
    background: var(--code-bg, var(--surface, #ffffff));
    border: 1px solid var(--border, #d0d7e2);
    border-radius: var(--radius-md, var(--radius, 12px));
    box-shadow: var(--shadow-sm, var(--shadow, 0 1px 2px rgba(16, 24, 40, 0.08)));
    overflow: hidden;
    transition:
      border-color 0.2s ease,
      box-shadow 0.2s ease,
      transform 0.2s ease;
  }

  .code-block-wrapper:hover,
  .code-block-wrapper:focus-within {
    border-color: var(--accent, #0f62fe);
    box-shadow:
      var(--shadow-md, 0 8px 24px rgba(16, 24, 40, 0.12)),
      0 0 0 3px var(--accent-soft, rgba(15, 98, 254, 0.12));
  }

  .code-block-wrapper pre {
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    margin: 0 !important;
    overflow-x: auto;
    padding: 1.2em 5.2em 1.2em 1.2em !important;
    width: 100%;
    box-sizing: border-box;
  }

  /* style.less 側の pre::before 装飾を無効化 */
  .code-block-wrapper pre::before {
    display: none !important;
    content: none !important;
  }

  .copy-code-button {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 20;

    font-family: "Google Sans Code", monospace;
    font-size: 0.75rem;
    line-height: 1.4;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;

    min-height: 32px;
    padding: 6px 10px;

    color: var(--text-color, #1f2937);
    background: color-mix(in srgb, var(--surface, #ffffff) 88%, transparent);
    border: 1px solid var(--border, #d0d7e2);
    border-radius: 8px;

    cursor: pointer;
    opacity: 0;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);

    transition:
      opacity 0.18s ease,
      color 0.18s ease,
      border-color 0.18s ease,
      background-color 0.18s ease,
      box-shadow 0.18s ease,
      transform 0.18s ease;
  }

  .code-block-wrapper:hover .copy-code-button,
  .code-block-wrapper:focus-within .copy-code-button {
    opacity: 0.92;
  }

  .copy-code-button:hover {
    opacity: 1 !important;
    color: var(--accent, #0f62fe);
    background: var(--surface-muted, #f6f8fb);
    border-color: var(--accent, #0f62fe);
    box-shadow: 0 0 0 3px var(--accent-soft, rgba(15, 98, 254, 0.12));
    transform: translateY(-1px);
  }

  .copy-code-button:focus-visible {
    opacity: 1 !important;
    outline: none;
    box-shadow:
      0 0 0 3px var(--accent-soft, rgba(15, 98, 254, 0.18)),
      0 0 0 1px var(--accent, #0f62fe);
  }

  .copy-code-button:active {
    transform: translateY(0);
  }

  .copy-code-button.copied {
    opacity: 1 !important;
    color: #ffffff;
    background: var(--accent, #0f62fe);
    border-color: var(--accent, #0f62fe);
    box-shadow: 0 0 0 3px var(--accent-soft, rgba(15, 98, 254, 0.18));
  }

  .copy-code-button.failed {
    opacity: 1 !important;
    color: #ffffff;
    background: var(--danger, #b42318);
    border-color: var(--danger, #b42318);
    box-shadow: 0 0 0 3px rgba(180, 35, 24, 0.18);
  }

  /* 外部リンクの視認性を少し向上 */
  .markdown-preview a.external-link {
    text-decoration-style: dotted;
    text-underline-offset: 0.18em;
  }

  /* タッチ端末では hover が効きにくいので常時表示 */
  @media (hover: none),
  (pointer: coarse) {
    .copy-code-button {
      opacity: 0.92;
    }

    .code-block-wrapper pre {
      padding-right: 5.6em !important;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    html {
      scroll-behavior: auto;
    }

    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }

    .copy-code-button:hover,
    .copy-code-button:active {
      transform: none;
    }
  }

  @media print {
    .copy-code-button {
      display: none !important;
    }

    .code-block-wrapper {
      border: 1px solid #ccc !important;
      box-shadow: none !important;
    }
  }
</style>

<script type="text/javascript">
  document.addEventListener("DOMContentLoaded", function () {
    const container = document.querySelector(".markdown-preview") || document.body;

    const markExternalLink = (link) => {
      if (!(link instanceof HTMLAnchorElement)) return;
      if (!link.hostname) return;
      if (link.hostname === location.hostname) return;

      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.classList.add("external-link");
    };

    const fallbackCopyText = (text) => {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.top = "-9999px";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();

      let ok = false;
      try {
        ok = document.execCommand("copy");
      } catch (_) {
        ok = false;
      }

      document.body.removeChild(textarea);
      return ok;
    };

    const copyText = async (text) => {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return true;
      }
      return fallbackCopyText(text);
    };

    const setButtonState = (button, state) => {
      button.classList.remove("copied", "failed");

      if (state === "copied") {
        button.textContent = "COPIED";
        button.classList.add("copied");
        button.setAttribute("aria-label", "コードをコピーしました");
      } else if (state === "failed") {
        button.textContent = "FAILED";
        button.classList.add("failed");
        button.setAttribute("aria-label", "コードのコピーに失敗しました");
      } else {
        button.textContent = "COPY";
        button.setAttribute("aria-label", "コードをコピー");
      }
    };

    const createWrapper = (preBlock) => {
      if (!(preBlock instanceof HTMLPreElement)) return;
      if (preBlock.parentElement && preBlock.parentElement.classList.contains("code-block-wrapper")) return;

      const wrapper = document.createElement("div");
      wrapper.className = "code-block-wrapper";

      preBlock.parentNode.insertBefore(wrapper, preBlock);
      wrapper.appendChild(preBlock);

      const button = document.createElement("button");
      button.type = "button";
      button.className = "copy-code-button";
      button.textContent = "COPY";
      button.setAttribute("aria-label", "コードをコピー");
      button.setAttribute("title", "コードをコピー");

      button.addEventListener("click", async () => {
        const code = preBlock.querySelector("code");
        const text = code ? code.innerText : preBlock.innerText;

        if (!text || !text.trim()) return;

        try {
          const ok = await copyText(text);
          if (!ok) throw new Error("Copy failed");

          setButtonState(button, "copied");
          setTimeout(() => setButtonState(button, "idle"), 2000);
        } catch (err) {
          console.error("Copy failed:", err);
          setButtonState(button, "failed");
          setTimeout(() => setButtonState(button, "idle"), 2000);
        }
      });

      wrapper.appendChild(button);
    };

    const initializeNode = (root) => {
      if (!(root instanceof Element)) return;

      if (root.matches("pre")) {
        createWrapper(root);
      } else {
        root.querySelectorAll("pre").forEach(createWrapper);
      }

      if (root.matches("a")) {
        markExternalLink(root);
      } else {
        root.querySelectorAll("a").forEach(markExternalLink);
      }
    };

    initializeNode(container);

    const observer = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        mutation.addedNodes.forEach((node) => {
          if (node.nodeType === 1) {
            initializeNode(node);
          }
        });
      }
    });

    observer.observe(container, {
      childList: true,
      subtree: true
    });
  });
</script>
